{{- if and (not .Values.security.existingSecret) .Values.security.content }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "picoclaw.fullname" . }}-security
  labels:
    {{- include "picoclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  .security.yml: |
{{ .Values.security.content | indent 4 }}
{{- end }}
---
{{- if not .Values.picoToken.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "picoclaw.fullname" . }}-pico-token
  labels:
    {{- include "picoclaw.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # Placeholder - set actual token after deployment or use existingSecret
  {{ .Values.picoToken.secretKey }}: "CHANGE-ME"
{{- end }}
