apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "picoclaw.fullname" . }}-config
  labels:
    {{- include "picoclaw.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "version": {{ .Values.config.version }},
      "agents": {{ .Values.config.agents | toJson }},
      "channel_list": {
        {{- $first := true }}
        {{- if .Values.config.channels.telegram.enabled }}
        {{- if not $first }},{{ end }}
        {{- $first = false }}
        "telegram": {
          "enabled": true,
          "allow_from": {{ .Values.config.channels.telegram.allow_from | toJson }},
          "typing": {{ .Values.config.channels.telegram.typing | toJson }},
          "placeholder": {{ .Values.config.channels.telegram.placeholder | toJson }},
          "settings": {{ .Values.config.channels.telegram.settings | toJson }}
        }
        {{- end }}
        {{- if .Values.config.channels.teams_webhook.enabled }}
        {{- if not $first }},{{ end }}
        {{- $first = false }}
        "teams_webhook": {
          "enabled": true
        }
        {{- end }}
        {{- if .Values.config.channels.slack_webhook.enabled }}
        {{- if not $first }},{{ end }}
        {{- $first = false }}
        "slack_webhook": {
          "enabled": true,
          "settings": {{ .Values.config.channels.slack_webhook.settings | toJson }}
        }
        {{- end }}
        {{- if .Values.config.channels.pico.enabled }}
        {{- if not $first }},{{ end }}
        {{- $first = false }}
        "pico": {
          "enabled": true,
          "allow_from": {{ .Values.config.channels.pico.allow_from | toJson }},
          "settings": {{ .Values.config.channels.pico.settings | toJson }}
        }
        {{- end }}
      },
      "gateway": {{ .Values.config.gateway | toJson }},
      "model_list": {{ .Values.config.models | toJson }},
      "tools": {
        "web": {{ .Values.config.tools.web | toJson }},
        "exec": {{ .Values.config.tools.exec | toJson }},
        "mcp": {
          "enabled": {{ .Values.config.tools.mcp.enabled }},
          "servers": {
            {{- $first := true }}
            {{- range $name, $server := .Values.config.tools.mcp.servers }}
            {{- if $server.enabled }}
            {{- if not $first }},{{ end }}
            {{- $first = false }}
            {{ $name | quote }}: {{ $server | toJson }}
            {{- end }}
            {{- end }}
          }
        }
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "picoclaw.fullname" . }}-soul
  labels:
    {{- include "picoclaw.labels" . | nindent 4 }}
data:
  SOUL.md: |
{{ .Values.soul.content | indent 4 }}
