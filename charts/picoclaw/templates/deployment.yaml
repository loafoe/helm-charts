apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "picoclaw.fullname" . }}
  labels:
    {{- include "picoclaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "picoclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "picoclaw.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "picoclaw.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        # Copy config files to writable volume
        - name: copy-config
          image: busybox:1.36
          command: ["sh", "-c", "cp /config-ro/config.json /config/ && cp /security-ro/.security.yml /config/"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config-ro
              mountPath: /config-ro
              readOnly: true
            - name: security-ro
              mountPath: /security-ro
              readOnly: true
            - name: config
              mountPath: /config
        # Copy SOUL.md as root to make it immutable
        - name: copy-soul
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /soul-ro/SOUL.md /workspace/SOUL.md
              chown 0:0 /workspace/SOUL.md 2>/dev/null || true
              chmod 444 /workspace/SOUL.md
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false
            runAsUser: 0
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: soul-ro
              mountPath: /soul-ro
              readOnly: true
            - name: workspace
              mountPath: /workspace
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "picoclaw.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "gateway"
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: PICOCLAW_CONFIG
              value: "/config/config.json"
            {{- if .Values.aws.enabled }}
            - name: AWS_ROLE_ARN
              value: {{ .Values.aws.roleArn | quote }}
            - name: AWS_WEB_IDENTITY_TOKEN_FILE
              value: "/var/run/secrets/eks.amazonaws.com/serviceaccount/token"
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            {{- end }}
            {{- if .Values.config.channels.pico.enabled }}
            - name: PICOCLAW_CHANNELS_PICO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "picoclaw.picoTokenSecretName" . }}
                  key: {{ .Values.picoToken.secretKey }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.config.gateway.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
            {{- if .Values.aws.enabled }}
            - name: aws-iam-token
              mountPath: /var/run/secrets/eks.amazonaws.com/serviceaccount
              readOnly: true
            {{- end }}
            {{- if .Values.workspace.enabled }}
            - name: workspace
              mountPath: /workspace
            {{- end }}
      volumes:
        - name: config-ro
          configMap:
            name: {{ include "picoclaw.fullname" . }}-config
        - name: security-ro
          secret:
            secretName: {{ include "picoclaw.securitySecretName" . }}
            items:
              - key: .security.yml
                path: .security.yml
        - name: config
          emptyDir: {}
        - name: soul-ro
          configMap:
            name: {{ include "picoclaw.fullname" . }}-soul
        {{- if .Values.aws.enabled }}
        - name: aws-iam-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: {{ .Values.aws.tokenAudience }}
                  expirationSeconds: {{ .Values.aws.tokenExpirationSeconds }}
                  path: token
        {{- end }}
        {{- if .Values.workspace.enabled }}
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "picoclaw.workspacePvcName" . }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
