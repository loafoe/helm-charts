apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pico-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pico-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pico-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "pico-agent.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pico-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: METRICS_PORT
              value: "9090"
            - name: LOG_LEVEL
              value: {{ .Values.observability.logLevel | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.observability.logFormat | quote }}
            {{- if not .Values.spire.enabled }}
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "pico-agent.secretName" . }}
                  key: secret
            {{- end }}
            {{- if .Values.observability.otelEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otelEndpoint | quote }}
            {{- end }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.observability.otelServiceName | quote }}
            {{- if .Values.spire.enabled }}
            - name: SPIRE_ENABLED
              value: "true"
            - name: SPIRE_AGENT_SOCKET
              value: {{ .Values.spire.agentSocket | quote }}
            {{- if .Values.spire.trustDomains }}
            - name: SPIRE_TRUST_DOMAINS
              value: {{ .Values.spire.trustDomains | join "," | quote }}
            {{- else if .Values.spire.trustDomain }}
            - name: SPIRE_TRUST_DOMAIN
              value: {{ .Values.spire.trustDomain | quote }}
            {{- end }}
            {{- if .Values.spire.allowedSPIFFEIDs }}
            - name: SPIRE_ALLOWED_SPIFFE_IDS
              value: {{ .Values.spire.allowedSPIFFEIDs | join "," | quote }}
            {{- end }}
            - name: SPIRE_MTLS_ENABLED
              value: {{ .Values.spire.mtlsEnabled | quote }}
            {{- if .Values.spire.jwt.enabled }}
            - name: SPIRE_JWT_ENABLED
              value: "true"
            {{- if .Values.spire.jwt.audiences }}
            - name: SPIRE_JWT_AUDIENCES
              value: {{ .Values.spire.jwt.audiences | join "," | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ if .Values.spire.enabled }}/metrics{{ else }}/healthz{{ end }}
              port: {{ if .Values.spire.enabled }}metrics{{ else }}http{{ end }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ if .Values.spire.enabled }}/metrics{{ else }}/readyz{{ end }}
              port: {{ if .Values.spire.enabled }}metrics{{ else }}http{{ end }}
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.spire.enabled }}
          volumeMounts:
            - name: spire-agent-socket
              mountPath: {{ .Values.spire.socketMountPath | default "/spiffe-workload-api" }}
              readOnly: true
          {{- end }}
      {{- if .Values.spire.enabled }}
      volumes:
        - name: spire-agent-socket
          {{- if .Values.spire.csi.enabled }}
          csi:
            driver: csi.spiffe.io
            readOnly: true
          {{- else }}
          hostPath:
            path: {{ .Values.spire.hostSocketPath | default "/run/spire/agent-sockets" }}
            type: Directory
          {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
