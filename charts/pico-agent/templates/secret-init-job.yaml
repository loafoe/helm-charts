{{- if eq (include "pico-agent.needsInitJob" .) "true" -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pico-agent.fullname" . }}-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pico-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pico-agent.fullname" . }}-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pico-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pico-agent.fullname" . }}-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pico-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pico-agent.fullname" . }}-init
subjects:
  - kind: ServiceAccount
    name: {{ include "pico-agent.fullname" . }}-init
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "pico-agent.fullname" . }}-init-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pico-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        {{- include "pico-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "pico-agent.fullname" . }}-init
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: init-secret
          image: "{{ .Values.initJob.image.repository }}:{{ .Values.initJob.image.tag }}"
          imagePullPolicy: {{ .Values.initJob.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.initJob.resources | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              SECRET_NAME="{{ include "pico-agent.secretName" . }}"
              NAMESPACE="{{ .Release.Namespace }}"

              # Check if secret already exists
              if kubectl get secret "$SECRET_NAME" -n "$NAMESPACE" >/dev/null 2>&1; then
                echo "Secret $SECRET_NAME already exists, skipping creation"
                exit 0
              fi

              # Generate random secret (32 bytes, base64 encoded)
              WEBHOOK_SECRET=$(head -c 32 /dev/urandom | base64 | tr -d '\n')

              # Create the secret
              kubectl create secret generic "$SECRET_NAME" \
                --namespace="$NAMESPACE" \
                --from-literal=secret="$WEBHOOK_SECRET"

              echo "Secret $SECRET_NAME created successfully"
{{- end }}
