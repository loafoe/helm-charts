# Values for pico-agent on dip-ce-k3s-eu cluster

image:
  tag: "v0.25.0"

replicaCount: 1

# SPIRE enabled with CSI and JWT auth
spire:
  enabled: true
  csi:
    enabled: true
  trustDomains:
    - "dip-ce-k3s-eu.hsp.philips.com"
  allowedSPIFFEIDs:
    - "spiffe://dip-ce-k3s-eu.hsp.philips.com/ns/pico-mcp/sa/pico-mcp"
  mtlsEnabled: false
  jwt:
    enabled: true
    audiences:
      - "pico-agent-dip-ce-k3s-eu"

# Service account
serviceAccount:
  name: "pico-agent"

# RBAC
rbac:
  create: true

# Resources
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Observability
observability:
  logLevel: info
  logFormat: json
