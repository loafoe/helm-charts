# Default values for pico-agent

replicaCount: 1

image:
  repository: ghcr.io/loafoe/pico-agent
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Webhook configuration
webhook:
  # If secret is provided, it will be used directly
  # If empty, a random secret will be generated by the init job
  # When SPIRE is enabled, this becomes optional
  secret: ""
  # Name of existing secret to use (must contain 'secret' key)
  existingSecret: ""

# SPIRE/SPIFFE configuration for workload identity
# When enabled, provides an alternative to webhook signature verification
spire:
  # Enable SPIRE authentication (required for both mTLS and JWT modes)
  enabled: false
  # SPIRE agent socket path
  agentSocket: "unix:///run/spire/agent/sockets/spire-agent.sock"
  # Trust domains to accept (supports federation with multiple domains)
  # Example: ["example.org", "partner.com"]
  trustDomains: []
  # Legacy single trust domain (use trustDomains for new deployments)
  # Kept for backward compatibility
  trustDomain: ""
  # List of allowed SPIFFE IDs (empty = allow all from configured trust domains)
  # Example: ["spiffe://example.org/ai-agent", "spiffe://partner.com/service"]
  allowedSPIFFEIDs: []
  # JWT-SVID authentication (alternative to mTLS, via Authorization header)
  jwt:
    # Enable JWT-SVID validation
    enabled: false
    # Expected JWT audiences (at least one required when jwt.enabled=true)
    # Example: ["pico-agent", "https://pico-agent.example.org"]
    audiences: []

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use
  name: ""

# RBAC configuration
rbac:
  # Create ClusterRole and ClusterRoleBinding
  create: true

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  metricsPort: 9090

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 32Mi

# Observability settings
observability:
  logLevel: info
  logFormat: json
  # OpenTelemetry endpoint (optional)
  otelEndpoint: ""
  otelServiceName: pico-agent

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

nodeSelector:
  kubernetes.io/os: linux

tolerations: []

affinity: {}

# Init job configuration for secret generation
initJob:
  # Image for the init job (uses kubectl)
  image:
    repository: bitnami/kubectl
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi
