{{- if and .Values.api.clientSecretValue (not .Values.api.clientSecretRef) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "centcom.fullname" . }}-oauth2
  labels:
    {{- include "centcom.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-secret: {{ .Values.api.clientSecretValue | quote }}
{{- end }}
