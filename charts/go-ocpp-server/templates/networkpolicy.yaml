{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "go-ocpp-server.fullname" . }}
  labels:
    {{- include "go-ocpp-server.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "go-ocpp-server.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: {{ .Values.server.ocppPort }}
          protocol: TCP
        - port: {{ .Values.server.apiPort }}
          protocol: TCP
{{- end }}
