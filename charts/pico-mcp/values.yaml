# Default values for pico-mcp

replicaCount: 1

image:
  repository: ghcr.io/loafoe/pico-mcp
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# SPIRE/SPIFFE configuration
spire:
  # Enable SPIRE connection (required for JWT-SVID identity)
  enabled: true
  # SPIRE agent socket path (env var passed to the application)
  agentSocket: "unix:///spiffe-workload-api/spire-agent.sock"
  # Mount path for the SPIRE socket inside the container
  socketMountPath: "/spiffe-workload-api"
  # Host path for SPIRE socket (used when csi.enabled=false)
  hostSocketPath: "/run/spire/agent-sockets"
  # CSI driver configuration (recommended for clusters with spiffe-csi-driver)
  csi:
    enabled: true

# Server configuration
server:
  # Transport mode: "stdio" or "sse"
  transport: "sse"
  # Port for SSE server
  port: 8080
  # Base URL for SSE server (required for external access)
  # This URL is sent to clients so they know where to POST messages
  # Example: "https://pico-mcp.example.com"
  baseURL: ""

# Remote pico-agents to manage
agents:
  - id: "cluster-alpha"
    url: "http://pico-agent.alpha.svc.cluster.local:8080"
    jwt_audience: "pico-agent-alpha"
  - id: "cluster-beta"
    url: "http://pico-agent.beta.svc.cluster.local:8080"
    jwt_audience: "pico-agent-beta"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 32Mi

nodeSelector:
  kubernetes.io/os: linux

tolerations: []

affinity: {}

# HTTPRoute configuration for Gateway API
httpRoute:
  # Enable HTTPRoute for external access
  enabled: false
  # Hostname for the route
  hostname: ""
  # Gateway reference
  gatewayRef:
    name: platform
    namespace: kube-system
    sectionName: https
  # Optional annotations
  annotations: {}

# Network policy (Cilium)
networkPolicy:
  # Enable CiliumNetworkPolicy to restrict ingress to gateway only
  enabled: false

# IP allowlist for SSE endpoint (checked at application level via X-Forwarded-For)
ipAllowlist:
  # Enable IP allowlist checking
  enabled: false
  # List of allowed CIDRs
  cidrs: []
  # Example:
  # cidrs:
  #   - "10.0.0.0/8"
  #   - "192.168.1.0/24"
  #   - "203.0.113.42/32"
