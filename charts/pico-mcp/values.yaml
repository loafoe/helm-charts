# Default values for pico-mcp

replicaCount: 1

image:
  repository: ghcr.io/loafoe/pico-mcp
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# SPIRE/SPIFFE configuration
spire:
  # Enable SPIRE connection (required for JWT-SVID identity)
  enabled: true
  # SPIRE agent socket path (env var passed to the application)
  agentSocket: "unix:///spiffe-workload-api/spire-agent.sock"
  # Mount path for the SPIRE socket inside the container
  socketMountPath: "/spiffe-workload-api"
  # Host path for SPIRE socket (used when csi.enabled=false)
  hostSocketPath: "/run/spire/agent-sockets"
  # CSI driver configuration (recommended for clusters with spiffe-csi-driver)
  csi:
    enabled: true

# Server configuration
server:
  # Transport mode: "stdio" or "sse"
  transport: "sse"
  # Port for SSE server
  port: 8080
  # Base URL for SSE server (required for external access)
  # This URL is sent to clients so they know where to POST messages
  # Example: "https://pico-mcp.example.com"
  baseURL: ""

# Remote pico-agents to manage
agents:
  - id: "cluster-alpha"
    url: "http://pico-agent.alpha.svc.cluster.local:8080"
    jwt_audience: "pico-agent-alpha"
  - id: "cluster-beta"
    url: "http://pico-agent.beta.svc.cluster.local:8080"
    jwt_audience: "pico-agent-beta"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 32Mi

nodeSelector:
  kubernetes.io/os: linux

tolerations: []

affinity: {}

# HTTPRoute configuration for Gateway API
httpRoute:
  # Enable HTTPRoute for external access
  enabled: false
  # Hostname for the route
  hostname: ""
  # Gateway reference
  gatewayRef:
    name: platform
    namespace: kube-system
    sectionName: https
  # Optional annotations
  annotations: {}

# Network policy (Cilium)
networkPolicy:
  # Enable CiliumNetworkPolicy to restrict ingress to gateway only
  enabled: false

# IP allowlist for SSE endpoint (checked at application level via X-Forwarded-For)
ipAllowlist:
  # Enable IP allowlist checking
  enabled: false
  # List of allowed CIDRs
  cidrs: []
  # Example:
  # cidrs:
  #   - "10.0.0.0/8"
  #   - "192.168.1.0/24"
  #   - "203.0.113.42/32"

# Picoclaw WebSocket client configuration
picoclaw:
  # Enable picoclaw integration for streaming chat
  enabled: false
  # WebSocket URL for picoclaw pico channel (without token query param)
  # Example: "ws://picoclaw.picoclaw.svc.cluster.local:1337/pico/ws"
  url: ""
  # Secret containing the picoclaw token
  # The secret should have a key named "token"
  tokenSecret:
    name: ""
    key: "token"

# Feature flags for optional functionality
features:
  # Enable get_resource tool for fetching arbitrary Kubernetes resources
  getResource: false

# Alerting configuration
alerts:
  pvUsage:
    # Enable PV usage monitoring and alerting
    enabled: false
    # Polling interval (Go duration format)
    interval: "5m"
    # Alert threshold percentage (0-100)
    thresholdPercent: 80
    # Cooldown between repeated alerts for same PV
    cooldown: "1h"
    # Enable auto-remediation (resize PVCs via picoclaw skill)
    autoRemediate: false

# OpenTelemetry configuration
otel:
  # Enable OpenTelemetry instrumentation
  enabled: false
  # OTLP exporter endpoint (e.g., "tempo.monitoring:4317")
  endpoint: ""
  # Export protocol: "grpc" or "http"
  protocol: "grpc"
  # Capture prompt/completion content (may contain PII)
  captureContent: false

# API configuration (see api section above for usage)
# api:
#   oauth2:
#     allowedGroups: []  # Empty = all authenticated users allowed
#     # Example: allowedGroups: ["pico-admins", "platform-team"]

# Database configuration (dip.io Postgres CRD)
database:
  # Enable PostgreSQL database for persistent state (chat history, alerts)
  enabled: false
  # Use CNPG (CloudNativePG) provider instead of RDS
  cnpg: true
  # Database identifier (defaults to release fullname)
  identifier: ""
  # Database size: small, medium, large
  size: "small"
  # PostgreSQL version
  engineVersion: "18.1"
  # Database name
  databaseName: "picomcp"
  # Master username
  username: "picomcp"
  # Restore from snapshot
  restoreFromSnapshot: false
  snapshotId: ""
  # CNPG snapshot configuration
  snapshots:
    enabled: false
    snapshotClassName: ""
    storageClassName: ""
  # CNPG volume snapshot restore
  restoreFromVolumeSnapshot:
    enabled: false
    storageClassName: ""
    sourceIdentifier: ""
