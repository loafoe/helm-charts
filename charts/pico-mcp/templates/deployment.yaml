apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pico-mcp.fullname" . }}
  labels:
    {{- include "pico-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pico-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "pico-mcp.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pico-mcp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config"
            - "/etc/pico-mcp/config.yaml"
          env:
          {{- if and .Values.picoclaw.enabled .Values.picoclaw.tokenSecret.name }}
            - name: PICOCLAW_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.picoclaw.tokenSecret.name }}
                  key: {{ .Values.picoclaw.tokenSecret.key | default "token" }}
          {{- end }}
          {{- if .Values.database.enabled }}
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "pico-mcp.fullname" . }}-postgres-connection
                  key: host
            - name: DATABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "pico-mcp.fullname" . }}-postgres-connection
                  key: port
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "pico-mcp.fullname" . }}-postgres-connection
                  key: database
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "pico-mcp.fullname" . }}-postgres-connection
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pico-mcp.fullname" . }}-postgres-connection
                  key: password
            - name: DATABASE_SSLMODE
              valueFrom:
                secretKeyRef:
                  name: {{ include "pico-mcp.fullname" . }}-postgres-connection
                  key: sslmode
                  optional: true
          {{- end }}
          {{- if .Values.otel.enabled }}
            - name: OTEL_ENABLED
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: {{ include "pico-mcp.fullname" . | quote }}
            {{- if .Values.otel.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            {{- end }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.otel.protocol | quote }}
            - name: OTEL_GENAI_CAPTURE_CONTENT
              value: {{ .Values.otel.captureContent | quote }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- if eq .Values.server.transport "sse" }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/pico-mcp
              readOnly: true
            {{- if and .Values.ui .Values.ui.logo .Values.ui.logo.enabled }}
            - name: logo
              mountPath: /etc/pico-mcp/logo
              readOnly: true
            {{- end }}
            {{- if .Values.spire.enabled }}
            - name: spire-agent-socket
              mountPath: {{ .Values.spire.socketMountPath | default "/spiffe-workload-api" }}
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "pico-mcp.fullname" . }}-config
        {{- if and .Values.ui .Values.ui.logo .Values.ui.logo.enabled }}
        - name: logo
          configMap:
            name: {{ include "pico-mcp.fullname" . }}-logo
        {{- end }}
        {{- if .Values.spire.enabled }}
        - name: spire-agent-socket
          {{- if .Values.spire.csi.enabled }}
          csi:
            driver: csi.spiffe.io
            readOnly: true
          {{- else }}
          hostPath:
            path: {{ .Values.spire.hostSocketPath | default "/run/spire/agent-sockets" }}
            type: DirectoryOrCreate
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
