{{- if .Values.leaderElection.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pico-mcp.fullname" . }}-leader-election
  labels:
    {{- include "pico-mcp.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - create
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pico-mcp.fullname" . }}-leader-election
  labels:
    {{- include "pico-mcp.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pico-mcp.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "pico-mcp.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
