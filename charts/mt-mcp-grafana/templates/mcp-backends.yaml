{{- range .Values.backends }}
{{- if not .externalUrl }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ $.Release.Name }}-{{ .name }}-mcp"
  labels:
    {{- include "mt-mcp-grafana.labels" $ | nindent 4 }}
    mcp-instance: "{{ .name }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mt-mcp-grafana.selectorLabels" $ | nindent 6 }}
      mcp-instance: "{{ .name }}"
  template:
    metadata:
      labels:
        {{- include "mt-mcp-grafana.selectorLabels" $ | nindent 8 }}
        mcp-instance: "{{ .name }}"
    spec:
      containers:
        - name: grafana-mcp
          image: "grafana/mcp-grafana:{{ .imageTag | default "0.14.0" }}"
          imagePullPolicy: IfNotPresent
          command: ["/app/mcp-grafana"]
          args:
            - "--transport"
            - "streamable-http"
            - "--address"
            - "0.0.0.0:8000"
            {{- if $.Values.backendMetrics.enabled }}
            # Prometheus metrics on a separate listener, off the :8000 MCP data
            # plane (no port clash).
            - "--metrics"
            - "--metrics-address"
            - "0.0.0.0:{{ $.Values.backendMetrics.port | default 9090 }}"
            {{- end }}
            {{- range .args }}
            - "{{ . }}"
            {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            {{- if $.Values.backendMetrics.enabled }}
            - name: metrics
              containerPort: {{ $.Values.backendMetrics.port | default 9090 }}
              protocol: TCP
            {{- end }}
          env:
            - name: GRAFANA_URL
              value: "{{ .grafanaUrl }}"
            - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: "{{ .tokenSecret.name }}"
                  key: "{{ .tokenSecret.key | default "token" }}"
            {{- if and $.Values.tracing.enabled $.Values.tracing.enableOnBackends }}
            # OpenTelemetry: let this mcp-grafana join the proxy's trace by
            # exporting to the same collector (the proxy injects W3C traceparent).
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ $.Values.tracing.endpoint }}"
            - name: OTEL_SERVICE_NAME
              value: "mcp-grafana-{{ .name }}"
            {{- range $k, $v := $.Values.tracing.extraEnv }}
            - name: "{{ $k }}"
              value: "{{ $v }}"
            {{- end }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: "{{ $.Release.Name }}-{{ .name }}-mcp"
  labels:
    {{- include "mt-mcp-grafana.labels" $ | nindent 4 }}
    app.kubernetes.io/component: backend
    mcp-instance: "{{ .name }}"
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
    {{- if $.Values.backendMetrics.enabled }}
    - port: {{ $.Values.backendMetrics.port | default 9090 }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    {{- include "mt-mcp-grafana.selectorLabels" $ | nindent 4 }}
    mcp-instance: "{{ .name }}"
{{- end }}
{{- end }}
