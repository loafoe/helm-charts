apiVersion: v1
kind: Service
metadata:
  name: {{ include "mt-mcp-grafana.fullname" . }}
  labels:
    {{- include "mt-mcp-grafana.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.metrics.enabled }}
    - port: {{ .Values.metrics.port | default 9090 }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    {{- include "mt-mcp-grafana.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
