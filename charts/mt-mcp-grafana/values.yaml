# Default values for mt-mcp-grafana.
# This is a YAML-formatted file.

# -- Override the name of the chart
nameOverride: ""
# -- Override the fully qualified name of the chart
fullnameOverride: ""

# -- Number of proxy replicas (sessions are in-memory; use sticky routing with >1)
replicaCount: 1

image:
  # -- Docker registry repository for mt-mcp-grafana
  repository: andy/mt-mcp-grafana
  # -- Overrides the image tag (defaults to the chart appVersion)
  tag: ""
  # -- Docker image pull policy
  pullPolicy: IfNotPresent

service:
  # -- Kubernetes Service type for exposing the proxy
  type: ClusterIP
  # -- Service port
  port: 8080

server:
  # -- The port the proxy binary listens on inside the container
  port: 8080
  # -- The exposed MCP endpoint path
  path: /mcp

# -- Authentication settings for incoming LLM/client JWTs
auth:
  # -- JWT verification mode: jwks | static | insecure
  mode: jwks
  # -- Path to the claim in the JWT holding user groups
  groupsClaim: groups
  # -- Expected JWT issuer (iss claim)
  issuer: "https://issuer.company.com"
  # -- Expected JWT audience (aud claim)
  audience: "mcp-grafana"
  # -- Optional explicit JWKS URL (if omitted, discovered via OIDC metadata)
  jwksUrl: ""

  # -- Static mode credentials (only evaluated if auth.mode is "static")
  # hmacSecret: "my-hmac-shared-key"
  # publicKeyPemFile: "" # Mount as /etc/mt-mcp-grafana/keys/public.pem if used

# -- mcp-grafana backends.
# Each entry is either a MANAGED backend (the chart deploys an mcp-grafana pod
# for it) or an EXTERNAL backend (an already-running mcp-grafana at a URL you
# provide). The proxy routes to both the same way.
#
# Managed (default): the chart deploys an mcp-grafana pod + Service and wires
# the proxy to it via in-cluster DNS. Set grafanaUrl + tokenSecret.
#
# External: set externalUrl to the pre-existing mcp-grafana endpoint URL.
# The chart will NOT deploy a pod/service; the proxy routes directly to that
# URL. The service account token must still be provided (via tokenSecret) so
# the proxy can inject it as the upstream Authorization header.
# SECURITY: external mcp-grafana has no inbound auth. The URL must be
# network-secured (VPN, mTLS, IP allowlist) — anyone who can reach it bypasses
# the proxy's JWT verification.
#
# Model: groups authorize, tenant selects, backend executes.
# A tenant id is what list_grafana_instances advertises and what the agent
# targets via the `tenant` tool argument. The caller's JWT groups must
# intersect a tenant's groups to use it.
backends:
  # -- Example: managed backend (chart deploys mcp-grafana pod + service)
  - # -- Internal/ops name for this backend (logging, must be unique)
    name: grafana-ab
    # -- Target Grafana stack URL for the managed mcp-grafana instance
    grafanaUrl: "https://grafana.company.com/team-ab"
    # -- Optional per-backend headers sent toward this mcp-grafana instance
    headers: {}
    # -- Service account token secret configuration
    tokenSecret:
      # -- Kubernetes Secret name
      name: grafana-ab-token-secret
      # -- Key in the Secret holding the token
      key: token
      # -- Whether this chart should create the Secret inline
      create: true
      # -- Raw service account token (only used if tokenSecret.create is true)
      value: "glsa_my-service-account-token-ab"
    # -- Tenants served by this backend. Each tenant is a selectable routing
    # unit: its id is advertised to the agent, and its groups determine who
    # can select it.
    tenants:
      - # -- Globally unique tenant id (the routing key)
        id: team-a
        # -- JWT groups authorized to select this tenant
        groups:
          - team-a
        # -- Optional per-tenant headers (merge over backend headers)
        headers: {}
      - id: team-b
        groups:
          - team-b
        headers:
          X-Grafana-Org-Id: "2"

  # -- Example: another managed backend
  - name: grafana-c
    grafanaUrl: "https://grafana.company.com/team-c"
    headers: {}
    tokenSecret:
      name: grafana-c-token-secret
      key: token
      create: true
      value: "glsa_my-service-account-token-c"
    tenants:
      - id: team-c
        groups:
          - team-c
        headers: {}

  # -- Example: external backend (pre-existing mcp-grafana, no pod deployed)
  # - name: grafana-external
  #   # -- URL of the pre-existing mcp-grafana endpoint. When set, no pod/service
  #   # is deployed; the proxy routes directly to this URL.
  #   externalUrl: "https://mcp-grafana.private.example.com/mcp"
  #   headers: {}
  #   tokenSecret:
  #     name: grafana-external-token-secret
  #     key: token
  #     create: false  # use a pre-existing Secret
  #   tenants:
  #     - id: team-ext
  #       groups:
  #         - team-external
  #       headers: {}

# -- Pod resource requests and limits
resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# -- Node selectors for pod scheduling
nodeSelector: {}

# -- Pod tolerations
tolerations: []

# -- Pod affinity rules
affinity: {}
